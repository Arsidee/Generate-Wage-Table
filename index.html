<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Wage Table Generator</title>
  <link href="style.css" rel="stylesheet" type="text/css">
</head>

<body>

  <a href="https://arsidee.github.io/Portfolio-Frontend-App/">Home</a>

  <main>
    <h1>Wage Table Generator</h1>

    <button id="reset-btn">Reset</button>
    <button id="generate-btn">Generate</button>

    <br><br>

    <div class="table-x-overflow">
      <table>
        <thead>
          <tr>
            <th>$/hr</th>
            <th>Day</th>
            <th>Week</th>
            <th>2 Weeks</th>
            <th>Month</th>
            <th>Quarter</th>
            <th>2 Quarters</th>
            <th>Year</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
